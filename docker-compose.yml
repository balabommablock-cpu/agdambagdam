version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: abacus
      POSTGRES_USER: abacus
      POSTGRES_PASSWORD: abacus_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/server/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abacus"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    ports:
      - "3456:3456"
    environment:
      DATABASE_URL: postgres://abacus:abacus_dev@postgres:5432/abacus
      PORT: 3456
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "3457:80"
    depends_on:
      - server

volumes:
  pgdata:
